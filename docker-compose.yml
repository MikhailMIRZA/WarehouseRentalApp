version: '3.8'

services:
  postgres:
    image: postgres:13
    container_name: hotel-db
    environment:
      POSTGRES_DB: BookingDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Password123
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile.wait
    container_name: hotel-api
    ports:
      - '5000:8080'
    environment:
      - ConnectionStrings__DefaultConnection=Host=hotel-db;Database=BookingDB;Username=postgres;Password=Password123
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      postgres:
        condition: service_healthy
